services:
  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "8000:8000"
    ipc: host
    environment:
      HF_TOKEN: ${HF_TOKEN}
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    command:
      - --model
      - Qwen/Qwen3-0.6B
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
