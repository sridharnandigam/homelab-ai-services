name: llama-server

services:
  server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda13
    entrypoint: ["llama-server"]
    command:
      - -m
      - ${LLAMA_MODEL:-/models/model.gguf}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    ports:
      - "${LLAMA_PORT:-8080}:8080"
    volumes:
      - type: bind
        source: ../models
        target: /models
        read_only: true
    gpus: all
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  llama:
    image: ghcr.io/ggml-org/llama.cpp:full-cuda13
    entrypoint: ["llama-cli"]
    volumes:
      - type: bind
        source: ../models
        target: /models
        read_only: true
    gpus: all
