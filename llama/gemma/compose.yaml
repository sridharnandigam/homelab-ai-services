name: gemma

services:
  server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda13
    command:
      - -m
      - ${LLAMA_MODEL:-/models/model.gguf}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    ports:
      - "${LLAMA_PORT:-8080}:8080"
    volumes:
      - type: bind
        source: ${MODEL_DIR:-../models}
        target: /models
        read_only: true
    gpus: all
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
  
  bench:
    image: ghcr.io/ggml-org/llama.cpp:full-cuda13
    profiles: [bench]
    entrypoint: ["llama-bench"]
    command:
      - "--model"
      - "/models/gemma-4-26B-A4B-it-Q4_K_M.gguf"
      - "--n-gpu-layers"
      - "-1"
      - "--flash-attn"
      - "1"
      - "--n-ubatch"
      - "2048"
    volumes:
      - ${MODEL_DIR:-../models}:/models:ro
      - ./results:/results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
